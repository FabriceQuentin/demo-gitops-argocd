apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-web-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FabriceQuentin/demo-gitops-argocd.git
    targetRevision: main
    path: apps/demo-web/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
